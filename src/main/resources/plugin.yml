name: DiamondLogger
main: org.betamc.diamondlogger.DiamondLogger
version: ${project.version}
author: zavdav

commands:
  reloaddl:
    description: Reloads DiamondLogger.
    usage: /reloaddl

permissions:
  diamondlogger.reload:
    description: Allows access to /reloaddl
    default: op
  diamondlogger.receivemessage:
    description: Makes a player receive DiamondLogger messages
    default: op
